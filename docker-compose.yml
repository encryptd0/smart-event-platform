services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    # Internal port only — nothing exposed to the host.
    expose:
      - "27017"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/eventflow
      # Override these in a real deployment via .env or your host's secrets manager.
      SESSION_SECRET: ${SESSION_SECRET:-change_me_to_a_long_random_string}
      NODE_ENV: production
    ports:
      - "3000:3000"

  # One-shot seeder. Run with:  docker compose run --rm seed
  seed:
    build: .
    depends_on:
      - mongo
    environment:
      MONGODB_URI: mongodb://mongo:27017/eventflow
      NODE_ENV: production
    command: ["node", "seeders/seed.js", "--force"]
    profiles: ["tools"]

volumes:
  mongo-data:
